<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Password Strength Analyzer</h1>

    <form method="POST">

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Analyze Password
        </button>

    </form>

    {% if strength %}

        <h2 style="color: {{ color }}">
            Strength: {{ strength }}
        </h2>

        <h3>Score: {{ score }}/6</h3>

        {% if suggestions %}
            <h3>Suggestions:</h3>

            <ul>
                {% for item in suggestions %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
        {% endif %}

    {% endif %}

</div>

</body>
</html>
